services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql:ro
      - ./sql/seed_assets.sql:/docker-entrypoint-initdb.d/02_seed_assets.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-ETF Systematic Portfolio Platform}
      APP_ENV: production
      API_PREFIX: /api
      APP_ALLOWED_HOSTS: localhost,127.0.0.1,${DOMAIN:?DOMAIN is required}
      TRUST_PROXY_HEADERS: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKFLOW_EXECUTION_MODE: worker
      WORKFLOW_WORKER_POLL_SECONDS: ${WORKFLOW_WORKER_POLL_SECONDS:-2}
      WORKFLOW_WORKER_HEARTBEAT_TTL_SECONDS: ${WORKFLOW_WORKER_HEARTBEAT_TTL_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      TUSHARE_API_URL: ${TUSHARE_API_URL:-https://api.tushare.pro}
      TUSHARE_REQUEST_INTERVAL_SECONDS: ${TUSHARE_REQUEST_INTERVAL_SECONDS:-1.5}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-45}
      DEEPSEEK_MAX_TOKENS: ${DEEPSEEK_MAX_TOKENS:-1800}
      DEEPSEEK_THINKING_ENABLED: ${DEEPSEEK_THINKING_ENABLED:-false}
      AUTH_ENABLED: "true"
      AUTH_ADMIN_USERNAME: ${AUTH_ADMIN_USERNAME:?AUTH_ADMIN_USERNAME is required}
      AUTH_ADMIN_PASSWORD_HASH: ${AUTH_ADMIN_PASSWORD_HASH:?AUTH_ADMIN_PASSWORD_HASH is required}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?AUTH_SESSION_SECRET is required}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-12}
      AUTH_COOKIE_SECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://127.0.0.1:8000/health/ready', headers={'Host':'localhost'}, timeout=5).raise_for_status()"]
      interval: 20s
      timeout: 8s
      retries: 5
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && exec python -m app.worker"]
    environment:
      APP_NAME: ${APP_NAME:-ETF Systematic Portfolio Platform}
      APP_ENV: production
      API_PREFIX: /api
      APP_ALLOWED_HOSTS: localhost,127.0.0.1,${DOMAIN:?DOMAIN is required}
      TRUST_PROXY_HEADERS: "true"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKFLOW_EXECUTION_MODE: worker
      WORKFLOW_WORKER_POLL_SECONDS: ${WORKFLOW_WORKER_POLL_SECONDS:-2}
      WORKFLOW_WORKER_HEARTBEAT_TTL_SECONDS: ${WORKFLOW_WORKER_HEARTBEAT_TTL_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      TUSHARE_API_URL: ${TUSHARE_API_URL:-https://api.tushare.pro}
      TUSHARE_REQUEST_INTERVAL_SECONDS: ${TUSHARE_REQUEST_INTERVAL_SECONDS:-1.5}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-45}
      DEEPSEEK_MAX_TOKENS: ${DEEPSEEK_MAX_TOKENS:-1800}
      DEEPSEEK_THINKING_ENABLED: ${DEEPSEEK_THINKING_ENABLED:-false}
      AUTH_ENABLED: "true"
      AUTH_ADMIN_USERNAME: ${AUTH_ADMIN_USERNAME:?AUTH_ADMIN_USERNAME is required}
      AUTH_ADMIN_PASSWORD_HASH: ${AUTH_ADMIN_PASSWORD_HASH:?AUTH_ADMIN_PASSWORD_HASH is required}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?AUTH_SESSION_SECRET is required}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-12}
      AUTH_COOKIE_SECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis, os; r=redis.Redis(host=os.getenv('REDIS_HOST','redis'), port=int(os.getenv('REDIS_PORT','6379')), decode_responses=True); assert r.get('workflow_worker:heartbeat')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_HOST_PORT:-5174}:80"
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 20s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data_prod:
  redis_data_prod:
