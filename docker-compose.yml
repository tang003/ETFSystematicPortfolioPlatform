services:
  postgres:
    image: postgres:16-alpine
    container_name: quant_etf_postgres
    environment:
      POSTGRES_DB: quant_etf
      POSTGRES_USER: quant_etf
      POSTGRES_PASSWORD: quant_etf_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql:ro
      - ./sql/seed_assets.sql:/docker-entrypoint-initdb.d/02_seed_assets.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_etf -d quant_etf"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quant_etf_redis
    ports:
      - "6380:6379"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: quant_etf_api
    environment:
      APP_NAME: ${APP_NAME:-ETF Systematic Portfolio Platform}
      APP_ENV: ${APP_ENV:-local}
      API_PREFIX: ${API_PREFIX:-/api}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-quant_etf}
      POSTGRES_USER: ${POSTGRES_USER:-quant_etf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_etf_password}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      WORKFLOW_EXECUTION_MODE: ${WORKFLOW_EXECUTION_MODE:-inline}
      WORKFLOW_WORKER_POLL_SECONDS: ${WORKFLOW_WORKER_POLL_SECONDS:-2}
      WORKFLOW_WORKER_HEARTBEAT_TTL_SECONDS: ${WORKFLOW_WORKER_HEARTBEAT_TTL_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      TUSHARE_REQUEST_INTERVAL_SECONDS: ${TUSHARE_REQUEST_INTERVAL_SECONDS:-1.5}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_ADMIN_USERNAME: ${AUTH_ADMIN_USERNAME:-admin}
      AUTH_ADMIN_PASSWORD_HASH: ${AUTH_ADMIN_PASSWORD_HASH:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-12}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: quant_etf_frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
